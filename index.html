        if (!text || text.trim().length === 0) return false;
        const prompt = `你是一個專業分析師。請分析這段文字是正向還是負向投訴。只需回傳一個單字：NEGATIVE 或 POSITIVE。內容：${text}`;
        const payload = { contents: [{ parts: [{ text: prompt }] }] };

        try {
            const response = await fetch(`${GEMINI_API_URL}?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await response.json();
            const sentiment = result.candidates?.[0]?.content?.parts?.[0]?.text?.trim()?.toUpperCase();
            return sentiment === "NEGATIVE";
        } catch (err) {
            return text.length > 5;
        }

    /**
     * iOS 日期鎖定強化邏輯
     */
    function applyTimeConstraints() {
        const dateInput = document.getElementById('serviceDate');
        if(!dateInput) return;

        const now = new Date();
        const yesterday = new Date(now.getTime() - (24 * 60 * 60 * 1000));
        
        const toISO = (d) => {
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        const todayStr = toISO(now);
        const yesterdayStr = toISO(yesterday);

        // 設置 HTML5 原生限制 (Android 主要依賴此項)
        dateInput.max = todayStr;
        dateInput.min = yesterdayStr;
        dateInput.value = todayStr;

        // 針對 iOS Safari 滾輪可越界的修正 (強制攔截)
        dateInput.addEventListener('change', (e) => {
            const selectedDate = e.target.value;
            if (selectedDate !== todayStr && selectedDate !== yesterdayStr) {
                // 如果不符合今日或昨日，強制跳回今日
                e.target.value = todayStr;
                const warning = document.getElementById('dateWarning');
                if (warning) {
                    warning.classList.remove('hidden');
                    setTimeout(() => warning.classList.add('hidden'), 3000);
                }
            }
        });
    }

                    ${[1,2,3].map(a => `
                        <label class="flex items-center p-4 border rounded-2xl border-gray-100 bg-gray-50/50 active:bg-blue-50 transition cursor-pointer">
                            <input type="radio" name="q${i}" value="" class="w-5 h-5 mr-3" required> 
                            <span data-i18n="q${i}_a${a}">...</span>
                        </label>`).join('')}
                </div>
            </div>`;
        }
    }

    window.changeLang = function(lang) {
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = document.getElementById(`btn-${lang}`); if(activeBtn) activeBtn.classList.add('active');
        const trans = translations[lang] || translations['zh'];
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (trans[key]) {
                el.innerHTML = trans[key];
                const radioInput = el.previousElementSibling;
                if (radioInput && radioInput.type === 'radio') radioInput.value = trans[key]; 
            }
        });
        document.querySelectorAll('[data-ph]').forEach(el => {
            const key = el.getAttribute('data-ph');
            if (trans[key]) el.placeholder = trans[key];
        });
    };

    onAuthStateChanged(auth, (user) => {
        if(user) {
            isAuthorized = true;
            const btn = document.getElementById('submitBtn'); if(btn) { btn.disabled = false; btn.classList.remove('opacity-50'); }
            window.changeLang('zh');
        }
    });

    window.handleMarketingAction = async (action) => {
        if (!lastDocId || !auth.currentUser) return;
        try {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'surveys', lastDocId);
            await updateDoc(docRef, { marketingAction: action });
            if (action === 'Reviewed') window.open("https://maps.app.goo.gl/1Rto7b5TRNNF35yf8", "_blank");
            document.getElementById('successModal').classList.replace('modal-show', 'modal-hide');
        } catch (e) { console.error("Update Action Fail", e); }
    };

    document.getElementById('surveyForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        if(!isAuthorized || !auth.currentUser) return;
        
        const btn = document.getElementById('submitBtn');
        const lang = document.querySelector('.lang-btn.active').id.split('-')[1];
        const t = translations[lang];
        
        // 最終檢查日期防止繞過
        const dateVal = document.getElementById('serviceDate').value;
        const now = new Date();
        const yesterday = new Date(now.getTime() - (24 * 60 * 60 * 1000));
        const toISO = (d) => d.toISOString().split('T')[0];
        if (dateVal !== toISO(now) && dateVal !== toISO(yesterday)) {
            document.getElementById('serviceDate').value = toISO(now);
            return;
        }

        btn.disabled = true; btn.innerText = "...Processing...";
        
        const ratings = {};
        let hasNegativeRating = false;
        for(let i=1; i<=10; i++) {
            const radioGroup = document.getElementsByName(`q${i}`);
            const c = document.querySelector(`input[name="q${i}"]:checked`);
            ratings[`q${i}`] = c ? c.value : null;
            if (radioGroup[2].checked) hasNegativeRating = true;
        }

        const suggestionText = document.getElementById('suggestions').value.trim();
        const isTextNegative = await checkIsNegativeSentiment(suggestionText);
        const shouldHideMarketing = hasNegativeRating || isTextNegative;

        const surveyData = { 
            branch: t.branchName, 
            masseurId: document.getElementById('masseurId').value, 
            customerName: document.getElementById('custName').value || "Anonymous", 
            customerPhone: document.getElementById('custPhone').value || "N/A", 
            serviceDate: dateVal, 
            suggestions: suggestionText, 
            ratings: ratings, 
            submittedLang: lang, 
            createdAt: serverTimestamp(), 
            marketingAction: 'Pending',
            isFilteredNegative: shouldHideMarketing,
            uid: auth.currentUser.uid
        };

        try {
            const docRef = await addDoc(SURVEY_COLLECTION, surveyData);
            lastDocId = docRef.id;
            
            const googleBtn = document.getElementById('googleReviewBtn');
            const modalTextEl = document.getElementById('modalText');
            const modalCloseBtn = document.getElementById('modalCloseBtn');

            if (shouldHideMarketing) {
                googleBtn.style.display = 'none'; 
                modalTextEl.innerHTML = t.modalTextNegative; 
                modalCloseBtn.innerText = t.modalCloseNegative; 
            } else {
                googleBtn.style.display = 'flex'; 
                modalTextEl.innerHTML = t.modalText; 
                modalCloseBtn.innerText = t.modalClose; 
            }

            document.getElementById('surveyForm').reset();
            applyTimeConstraints();
            document.getElementById('successModal').classList.replace('modal-hide', 'modal-show');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } catch(err) { 
            console.error("Write Error:", err);
        } finally { 
            btn.disabled = false; btn.innerText = t.submitBtn; 
        }
    });

    window.onload = () => { 
        renderQuestions(); 
        applyTimeConstraints(); 
        // 依照規範先行登入
        const initAuth = async () => {
            try {
                await signInAnonymously(auth);
            } catch (e) {
                console.error("Auth Error");
            }
        };
        initAuth();
    };
</script>
</body>
</html>
