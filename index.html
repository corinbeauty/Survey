        .lang-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); background-color: white; color: #4b5563; border: 1px solid #e5e7eb; }

            background-color: #2563eb !important;

        #successModal { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .modal-show { opacity: 1; pointer-events: auto; transform: scale(1); }
        .modal-hide { opacity: 0; pointer-events: none; transform: scale(0.95); }
        
        @keyframes pulse-gold { 
            0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.7); } 
            70% { box-shadow: 0 0 0 15px rgba(251, 191, 36, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); } 
        }
        .btn-active-highlight { animation: pulse-gold 2s infinite; background-color: #fbbf24; color: #1e293b; }
        .btn-dimmed { background-color: #f1f5f9; color: #94a3b8; border: 1px solid #e2e8f0; }
    </style>

<body class="bg-slate-50 min-h-screen pb-12">

    // --- 輔助函式 ---
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 3500);
    }

    // --- 渲染問卷骨架 ---
    function renderQuestions() {
        const container = document.getElementById('questionsContainer');
        if (!container) return;
        
        let htmlBuffer = "";
        for (let i = 1; i <= 10; i++) {
            htmlBuffer += `
            <div class="bg-white p-6 question-card shadow-sm border border-gray-100">
                <p class="font-bold text-gray-800 mb-4 text-base">
                    ${i}. <span data-i18n="q${i}">...</span>
                </p>
                <div class="space-y-3">
                    ${[1, 2, 3].map(a => `
                        <label class="flex items-center p-4 border rounded-2xl border-gray-100 bg-gray-50/50 active:bg-blue-50 transition cursor-pointer">
                            <input type="radio" name="q${i}" value="" class="w-5 h-5 mr-3" required> 
                            <span data-i18n="q${i}_a${a}">...</span>
                        </label>`).join('')}
                </div>
            </div>`;
        }
        container.innerHTML = htmlBuffer;
    }

    // --- 語系切換功能 ---
    window.changeLang = function(lang) {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.id === `btn-${lang}`));
        const trans = translations[lang] || translations['zh'];
        
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (trans[key]) {
                el.innerHTML = trans[key];
                // 處理 Radio Button 的 Value
                if (el.previousElementSibling && el.previousElementSibling.type === 'radio') {
                    el.previousElementSibling.value = trans[key];
                }
            }
        });
        
        document.querySelectorAll('[data-ph]').forEach(el => {
            const key = el.getAttribute('data-ph');
            if (trans[key]) el.placeholder = trans[key];
        });
    };

    // --- 日期政策 ---
    function applyDatePolicy() {
        const dateInput = document.getElementById('serviceDate');
        const now = new Date();
        const yesterday = new Date(now.getTime() - 86400000);
        const fmt = (d) => {
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        };
        
        dateInput.max = fmt(now);
        dateInput.min = fmt(yesterday);
        dateInput.value = fmt(now);

        dateInput.addEventListener('change', (e) => {
            if (e.target.value !== fmt(now) && e.target.value !== fmt(yesterday)) {
                e.target.value = fmt(now);
                document.getElementById('dateWarning').classList.remove('hidden');
                setTimeout(() => document.getElementById('dateWarning').classList.add('hidden'), 3000);
            }
        });
    }

            } else {

        }
    };

    onAuthStateChanged(auth, (user) => {
        currentUser = user;
        const info = document.getElementById('conn-info');
        if (user) {
            info.innerText = "Secure Connection Ready";
            info.classList.add('text-green-600');
        } else {
            info.innerText = "Connection Lost - Retrying...";
            info.classList.remove('text-green-600');
        }
    });

    // --- 表單提交 ---
    document.getElementById('surveyForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        if (btn.disabled) return;

        btn.disabled = true;
        const originalText = btn.innerHTML;
        btn.innerHTML = `Processing...`;

        try {
            if (!currentUser) await initAuthFlow();
            
            const lang = document.querySelector('.lang-btn.active').id.split('-')[1];
            const t = translations[lang];

            const ratings = {};
            let hasCoreNegative = false;
            for (let i = 1; i <= 10; i++) {
                const radios = document.getElementsByName(`q${i}`);
                const selected = Array.from(radios).find(r => r.checked);
                ratings[`q${i}`] = selected ? selected.value : null;
                // Q1-Q7, Q10 為核心指標
                if ((i <= 7 || i === 10) && radios[2].checked) hasCoreNegative = true;
            }

            const surveyData = {
                branch: t.branchName,
                masseurId: document.getElementById('masseurId').value,
                customerName: document.getElementById('custName').value || "Anonymous",
                customerPhone: document.getElementById('custPhone').value || "N/A",
                serviceDate: document.getElementById('serviceDate').value,
                suggestions: document.getElementById('suggestions').value.trim(),
                ratings: ratings,
                submittedLang: lang,
                createdAt: serverTimestamp(),
                marketingAction: 'Pending',
                isFilteredNegative: hasCoreNegative,
                uid: auth.currentUser.uid
            };

            const docRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'surveys'), surveyData);
            lastDocId = docRef.id;

            // 成功反饋
            if (hasCoreNegative) {
                document.getElementById('googleReviewBtn').style.display = 'none';
                document.getElementById('modalText').innerHTML = t.modalTextNegative;
            } else {
                document.getElementById('googleReviewBtn').style.display = 'flex';
                document.getElementById('modalText').innerHTML = t.modalText;
            }

            document.getElementById('surveyForm').reset();
            applyDatePolicy();
            document.getElementById('successModal').classList.replace('modal-hide', 'modal-show');
            window.scrollTo({ top: 0, behavior: 'smooth' });

        } catch (err) {
            console.error("Submit Fail", err);
            showToast("❌ 提交失敗，請檢查網路。");
        } finally {
            btn.disabled = false;
            btn.innerHTML = originalText;
        }
    });

    window.handleMarketingAction = async (action) => {
        if (!lastDocId || !currentUser) return;
        try {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'surveys', lastDocId);
            await updateDoc(docRef, { marketingAction: action });
            if (action === 'Reviewed') window.open("https://maps.app.goo.gl/1Rto7b5TRNNF35yf8", "_blank");
            document.getElementById('successModal').classList.replace('modal-show', 'modal-hide');
        } catch (e) { console.error(e); }
    };

    // --- 生命週期啟動 ---
    document.addEventListener('DOMContentLoaded', () => {
        renderQuestions();
        applyDatePolicy();
        window.changeLang('zh');
        initAuthFlow();
    });
</script>
</body>
</html>
